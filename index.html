<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Z世界 · Deadline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <section id="mapPage" class="page active">
    <div class="map-wrap">
      <img src="map.jpg" alt="Z世界大地图" class="map-img" onerror="document.body.classList.add('no-map')">
      <div id="aiTopStatus" class="ai-top-status">载入AI时间系统中...</div>
      <div id="aiCompanyBadge" class="ai-company-badge">Deadline｜载入中</div>
      <button class="hot h-deadline" onclick="enterPlace('deadline')"></button>
      <button class="hot h-brand" onclick="enterPlace('brand_union')"></button>
      <button class="hot h-takemall" onclick="enterPlace('takemall')"></button>
      <button class="hot h-blood" onclick="enterPlace('blood')"></button>
      <button class="hot h-moon" onclick="enterPlace('moon')"></button>
      <button class="hot h-park" onclick="enterPlace('park')"></button>
      <button class="hot h-airport" onclick="enterPlace('airport')"></button>
      <button class="hot h-fashion" onclick="enterPlace('fashion')"></button>
      <button class="hot h-star" onclick="enterPlace('star')"></button>
      <button class="hot h-private" onclick="enterPlace('private')"></button>
      <button class="map-ui ui-phone" onclick="openOverlay('phone')"></button>
      <button class="map-ui ui-favor" onclick="openOverlay('favor')"></button>
      <button class="map-ui ui-map" onclick="showPage('mapPage')"></button>
      <button class="map-ui ui-industry" onclick="openOverlay('industry')"></button>
      <button class="map-ui ui-settings" onclick="openOverlay('settings')"></button>
    </div>
  </section>
  <section id="overlayPage" class="page overlay-page"><div class="overlay-shell"><div class="overlay-top"><button onclick="showPage('mapPage')">返回地图</button><h1 id="overlayTitle">功能</h1></div><div id="overlayContent" class="overlay-content"></div></div></section>
  <div id="sheet" class="sheet"></div>
  <section id="event" class="event"><div class="eventTop"><button onclick="closeEvent()">返回</button><h1 id="eventTitle">事件</h1></div><div class="eventBody"><div id="eventText" class="storyBox"></div><div id="choices"></div><div id="result"></div></div><div class="fixedInput"><input id="freeInput" placeholder="自由输入行动/回复/命令" /><button onclick="sendFreeAction()">发送</button></div></section>
</div>
<script src="game.js"></script>
</body>
</html>


<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Z世界 Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="home" class="page active">
<div class="top"><h2>万雾 · 首页</h2></div>
<div class="card"><h3>本周行程</h3><p>Deadline首次高层会议</p></div>
<div class="card"><h3>公司简报</h3><p>品牌档位：小众｜现金：30亿Z元</p></div>
<div class="card"><h3>短信</h3><p>闻叙白：有空见面吗？</p></div>
</div>

<div id="map" class="page">
<div class="mapwrap">
<img src="map.jpg">
<div class="hot" style="left:28%;top:12%;width:22%;height:12%" onclick="openPlace('Deadline总部',['工作室','会议室','办公室','咖啡厅','管理区','顶楼露台'])"></div>
<div class="hot" style="left:2%;top:24%;width:28%;height:14%" onclick="openPlace('TakeMall',['顶奢馆','艺术展区','会员层'])"></div>
<div class="hot" style="left:38%;top:38%;width:24%;height:12%" onclick="openPlace('Blood酒吧',['大厅','二楼卡座','VIP包厢'])"></div>
</div>
</div>

<div id="sheet" class="sheet"></div>

<div class="bottom">
<button onclick="show('home')">首页</button>
<button onclick="show('map')">地图</button>
<button onclick="show('data')">数据</button>
<button onclick="show('schedule')">行程</button>
<button onclick="show('settings')">设置</button>
</div>

<script src="game.js"></script>
</body>
</html>

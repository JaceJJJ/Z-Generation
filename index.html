
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Z世界 · 大地图</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <main class="map-screen">
    <div class="map">
      <img src="map.jpg" alt="Z世界大地图">

      <div class="hot" style="left:31%;top:13%;width:25%;height:10%" onclick="openPlace('deadline')"></div>
      <div class="hot" style="left:63%;top:15%;width:31%;height:10%" onclick="openPlace('alliance')"></div>
      <div class="hot" style="left:3%;top:27%;width:29%;height:10%" onclick="openPlace('takemall')"></div>
      <div class="hot" style="left:37%;top:40%;width:27%;height:10%" onclick="openPlace('blood')"></div>
      <div class="hot" style="left:63%;top:41%;width:31%;height:10%" onclick="openPlace('moon')"></div>
      <div class="hot" style="left:7%;top:50%;width:28%;height:10%" onclick="openPlace('park')"></div>
      <div class="hot" style="left:36%;top:62%;width:30%;height:9%" onclick="openPlace('airport')"></div>
      <div class="hot" style="left:68%;top:55%;width:28%;height:19%" onclick="openPlace('fashion')"></div>
      <div class="hot" style="left:7%;top:74%;width:32%;height:10%" onclick="openPlace('star')"></div>
      <div class="hot" style="left:65%;top:75%;width:29%;height:12%" onclick="openPlace('private')"></div>
    </div>
  </main>

  <div id="status" class="status"></div>
  <div id="sheet" class="sheet"></div>

  <section id="event" class="event">
    <div class="eventTop"><h1 id="eventTitle"></h1></div>
    <div class="eventBody">
      <div class="card"><p id="eventText"></p></div>
      <div id="choices"></div>
      <div id="result"></div>
    </div>
  </section>
</div>
<script src="game.js"></script>
</body>
</html>
